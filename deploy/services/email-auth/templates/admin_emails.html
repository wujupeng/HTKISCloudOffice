<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HTKIS 云办公 - 邮箱管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{color:#1a237e;font-size:20px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
th{background:#e8eaf6;color:#1a237e;font-weight:600}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-primary{background:#1a237e;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100}
.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px;border-radius:8px;width:360px}
.modal h3{margin-bottom:16px;color:#1a237e}
.modal input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;font-size:14px}
.modal .btn-group{display:flex;gap:8px;justify-content:flex-end}
.empty{text-align:center;color:#999;padding:20px}
</style>
</head>
<body>
<div class="container">
<h1>邮箱绑定管理</h1>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<h2 style="font-size:16px">用户邮箱列表</h2>
<button class="btn btn-primary" onclick="showBindModal()">绑定邮箱</button>
</div>
<table>
<thead><tr><th>用户名</th><th>邮箱</th><th>绑定时间</th><th>操作</th></tr></thead>
<tbody id="email-list"></tbody>
</table>
</div>
</div>

<div class="modal-overlay" id="bind-modal">
<div class="modal">
<h3 id="modal-title">绑定邮箱</h3>
<input type="text" id="modal-username" placeholder="用户名">
<input type="email" id="modal-email" placeholder="邮箱地址">
<div class="btn-group">
<button class="btn" onclick="closeModal()" style="background:#eee">取消</button>
<button class="btn btn-primary" onclick="doBind()">确定</button>
</div>
</div>
</div>

<script>
async function loadEmails(){
const r=await fetch('/api/email-auth/admin/emails');
const d=await r.json();
if(!d.success)return;
const tbody=document.getElementById('email-list');
if(d.data.length===0){
tbody.innerHTML='<tr><td colspan="4" class="empty">暂无数据</td></tr>';
return;
}
tbody.innerHTML=d.data.map(u=>`<tr>
<td>${u.username}</td>
<td>${u.email||'<span style="color:#999">未绑定</span>'}</td>
<td>${u.bound_at?new Date(u.bound_at).toLocaleString():'-'}</td>
<td>
${u.email?`<button class="btn btn-sm btn-primary" onclick="showBindModal('${u.username}','${u.email}')">修改</button>
<button class="btn btn-sm btn-danger" onclick="doUnbind('${u.username}')">解除</button>`
:`<button class="btn btn-sm btn-primary" onclick="showBindModal('${u.username}','')">绑定</button>`}
</td></tr>`).join('');
}

function showBindModal(username='',email=''){
document.getElementById('modal-username').value=username;
document.getElementById('modal-email').value=email;
document.getElementById('modal-title').textContent=username?'修改邮箱':'绑定邮箱';
document.getElementById('bind-modal').style.display='block';
}

function closeModal(){
document.getElementById('bind-modal').style.display='none';
}

async function doBind(){
const username=document.getElementById('modal-username').value.trim();
const email=document.getElementById('modal-email').value.trim();
if(!username||!email)return;
const r=await fetch('/api/email-auth/admin/bind-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email})});
const d=await r.json();
if(d.success){closeModal();loadEmails();}
else alert(d.message);
}

async function doUnbind(username){
if(!confirm('确定解除 '+username+' 的邮箱绑定？'))return;
const r=await fetch('/api/email-auth/admin/bind-email',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
const d=await r.json();
if(d.success)loadEmails();
else alert(d.message);
}

loadEmails();
</script>
</body>
</html>
