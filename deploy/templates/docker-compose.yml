services:
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: always
    network_mode: host
    environment:
      GUACD_LOG_LEVEL: debug
    volumes:
      - /data/shares/public:/drive

  postgres:
    image: postgres:15
    container_name: guac_postgres
    restart: always
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUAC_DB_PASSWORD}
    volumes:
      - guac_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: always
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: {{LAN_HOST}}
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD}
      GUACAMOLE_HOME: /etc/guacamole
    volumes:
      - ./guacamole-home:/etc/guacamole
    depends_on:
      - guacd
      - postgres

volumes:
  guac_pgdata: